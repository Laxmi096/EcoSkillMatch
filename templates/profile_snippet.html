<div class="container mb-5">
    <div class="profile-card shadow-lg">
        <div class="row align-items-center">
            <div class="col-md-2 text-center">
                <div class="avatar-wrapper mb-3 mb-md-0">
                    <img src="https://ui-avatars.com/api/?name={{ user.name }}&background=fff&color=059669&size=128" 
                         class="rounded-circle border border-4 border-white shadow" alt="Profile">
                </div>
            </div>
            <div class="col-md-6">
                <h2 class="fw-bold mb-1">{{ user.name }}</h2>
                <p class="opacity-75 mb-3"><i class="bi bi-geo-alt"></i> Sustainability Advocate • Mumbai, India</p>
                <div class="d-flex flex-wrap gap-2">
                    <span class="skill-tag-light">Solar Energy</span>
                    <span class="skill-tag-light">Carbon Accounting</span>
                    <span class="skill-tag-light">Waste Management</span>
                </div>
            </div>
            <div class="col-md-4 mt-4 mt-md-0">
                <div class="bg-white bg-opacity-10 p-3 rounded-4 border border-white border-opacity-25">
                    <div class="d-flex justify-content-between mb-2">
                        <span class="small fw-bold">Eco-Skill Readiness</span>
                        <span class="small">75%</span>
                    </div>
                    <div class="progress mb-3">
                        <div class="progress-bar" style="width: 75%"></div>
                    </div>
                    <button class="btn btn-light btn-sm w-100 fw-bold text-success">Update Skills</button>
                </div>
            </div>
        </div>
    </div>
</div>
