{% extends "layout.html" %}
{% block content %}

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="dashboard-card p-4 p-md-5 border-0 shadow-lg" style="border-radius: 30px;">
                <div class="text-center mb-5">
                    <div class="bg-success bg-opacity-10 d-inline-flex align-items-center justify-content-center rounded-circle mb-3" style="width: 80px; height: 80px;">
                        <i class="bi bi-shield-check text-success fs-1"></i>
                    </div>
                    <h2 class="fw-bold text-dark">Welcome Back</h2>
                    <p class="text-muted fw-medium">Access your green career portal</p>
                </div>

                {% if error %}
                    <div class="alert alert-danger border-0 rounded-4 small fw-bold mb-4 shadow-sm">
                        <i class="bi bi-exclamation-triangle-fill me-2"></i> {{ error }}
                    </div>
                {% endif %}

                <form method="POST" action="/login">
                    <div class="mb-3">
                        <label class="form-label small fw-bold text-uppercase text-muted letter-spacing-1">Email Address</label>
                        <input type="email" class="form-control" name="email" placeholder="name@company.com" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label small fw-bold text-uppercase text-muted letter-spacing-1">Password</label>
                        <input type="password" class="form-control" name="password" placeholder="••••••••" required>
                    </div>

                    <button class="btn btn-success w-100 py-3 fs-5 mb-4 shadow-sm">
                        Sign In
                    </button>
                </form>

                <div class="text-center">
                    <p class="text-muted small mb-0">New to the community?</p>
                    <a href="/register" class="text-success fw-bold text-decoration-none">
                        Create an Eco-Profile <i class="bi bi-arrow-right ms-1"></i>
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
