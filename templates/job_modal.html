<div class="modal fade" id="jobModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content border-0 shadow-2xl" style="border-radius: 28px; overflow: hidden;">
      
      <div class="modal-header border-0 pb-0 px-4 pt-4">
        <div class="bg-success bg-opacity-10 p-3 rounded-4 me-3">
            <i class="bi bi-award-fill fs-3 text-success"></i>
        </div>
        <div class="flex-grow-1">
            <h5 class="modal-title fw-800 text-dark mb-0" id="modalJobTitle"></h5>
            <p class="text-primary fw-bold mb-0" id="modalCompany"></p>
        </div>
        <button type="button" class="btn-close shadow-none" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>

      <div class="modal-body p-4">
        <div class="d-flex flex-wrap gap-2 mb-4">
          <span class="badge bg-light text-dark border px-3 py-2 rounded-pill fw-bold">
            <i class="bi bi-geo-alt-fill text-success me-1"></i> <span id="modalLocation"></span>
          </span>
          <span class="badge bg-light text-dark border px-3 py-2 rounded-pill fw-bold">
            <i class="bi bi-briefcase-fill text-success me-1"></i> <span id="modalType"></span>
          </span>
          <span class="badge bg-success text-white px-3 py-2 rounded-pill fw-bold">
            <i class="bi bi-shield-check me-1"></i> Eco-Verified Role
          </span>
        </div>

        <div class="bg-light p-4 rounded-4">
            <h6 class="text-uppercase small fw-800 text-muted letter-spacing-1 mb-3">Job Description</h6>
            <p id="modalDescription" class="text-main leading-relaxed mb-0" style="white-space: pre-line;"></p>
        </div>
      </div>

      <div class="modal-footer border-0 p-4 pt-0">
        <button class="btn btn-outline-secondary px-4 py-2 rounded-pill fw-bold border-2" data-bs-dismiss="modal">
          Keep Looking
        </button>
        <a href="#" class="btn btn-success px-5 py-2 rounded-pill fw-800 shadow-sm btn-hover-grow">
          Confirm & Apply <i class="bi bi-arrow-right ms-2"></i>
        </a>
      </div>

    </div>
  </div>
</div>

<script>
function openJobModal(title, company, location, type, description) {
  // Populate the fields
  document.getElementById("modalJobTitle").innerText = title;
  document.getElementById("modalCompany").innerText = company;
  document.getElementById("modalLocation").innerText = location;
  document.getElementById("modalType").innerText = type;
  document.getElementById("modalDescription").innerText = description;

  // Trigger the Bootstrap Modal
  const myModal = new bootstrap.Modal(document.getElementById('jobModal'));
  myModal.show();
}
</script>
